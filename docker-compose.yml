version: '3.8'

services:
  youku-downloader:
    build: .
    container_name: youku_downloader_arm64
    restart: unless-stopped
    ports:
      - "7860:7860"
    volumes:
      # 将宿主机的下载目录挂载到容器内的 /downloads
      - ./downloads:/downloads
      # 将配置目录挂载，方便你随时修改 cookie 而不用重启容器
      - ./config:/app/config
      # 将日志目录挂载，方便外部直接查看
      - ./logs:/app/logs
    environment:
      - DOWNLOAD_DIR=/downloads