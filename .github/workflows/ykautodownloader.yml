name: Build and Publish ykautodownloader

on:
  push:
    branches: [ main, master ] # 当推送到主分支时自动触发
    paths:
      - 'Dockerfile'
      - 'requirements.txt'
      - 'main.py'
      - 'core/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # 保留手动触发按钮

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 允许向 ghcr.io 推送镜像

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Convert to lowercase
        id: vars
        run: |
          # Docker 镜像名称强制要求小写
          echo "owner_lower=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "repo_lower=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # 【关键新增】设置 QEMU，支持跨平台编译（为了打包 ARM64 镜像）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 【核心设定】同时打包 amd64 和 arm64 架构的镜像，自动适配你的服务器
          platforms: linux/amd64,linux/arm64 
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lower }}/ykautodownloader:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ steps.vars.outputs.repo_lower }}
            org.opencontainers.image.description=Youku Auto Downloader (ARM64 Supported)
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max
